<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI家計簿 - かけいぼ</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Klee+One:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script>
        // ブラウザ保存機能の定義
        window.storage = {
            get: async (key) => ({ value: localStorage.getItem(key) }),
            set: async (key, val) => { localStorage.setItem(key, val); return { success: true }; },
            delete: async (key) => { localStorage.removeItem(key); return { success: true }; }
        };
    </script>
    <script type="text/babel" src="script.js"></script>
</body>
</html>
